<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useMemo,useCallback,useRef,useEffect}=React;

// ── Constantes ───────────────────────────────────────────────────────────
const MESES=["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];
const DIAS_SEMANA=["Lunes","Martes","Miércoles","Jueves","Viernes","Sábado","Domingo"];
const DIAS_CORTOS=["LUN","MAR","MIÉ","JUE","VIE","SÁB","DOM"];

// ── Parsear fecha (compatible con Excel serial y texto español) ───────────
// ── Parsear fecha — sin bug de timezone (UTC → Local) ───────────────────
// JS interpreta new Date("2026-05-19") como UTC midnight.
// En Chile (UTC-3) eso = 18/05 a las 21hs → aparece el día anterior.
// CORRECCIÓN: siempre crear con constructor LOCAL new Date(year, month, day).
function parseFecha(v){
  try{
    if(v===null||v===undefined||v==="") return null;
    if(v instanceof Date){
      // Si ya es Date, normalizar a medianoche local
      if(isNaN(v.getTime())) return null;
      return new Date(v.getFullYear(), v.getMonth(), v.getDate());
    }
    // ── Excel serial date (número) ────────────────────────────────────────
    if(typeof v==="number"){
      // Convertir a UTC para extraer componentes, luego crear fecha local
      const utcMs=Math.round((v-25569)*86400*1000);
      const tmp=new Date(utcMs);
      if(isNaN(tmp.getTime())) return null;
      // Usar UTC* para obtener el día correcto en cualquier timezone
      return new Date(tmp.getUTCFullYear(), tmp.getUTCMonth(), tmp.getUTCDate());
    }
    const s=String(v).trim();
    if(!s||s==="nan"||s==="NaN"||s==="None"||s==="undefined") return null;
    // ── Texto español: "lunes 5 de mayo 2026" / "19 de marzo de 2026" ────
    const MESES_ES=["enero","febrero","marzo","abril","mayo","junio","julio","agosto","septiembre","octubre","noviembre","diciembre"];
    const sl=s.toLowerCase();
    for(let i=0;i<MESES_ES.length;i++){
      if(sl.includes(MESES_ES[i])){
        const nums=(sl.match(/\d+/g)||[]);
        if(nums.length>=2){
          const day=parseInt(nums[0]);
          const year=nums[nums.length-1].length===4?parseInt(nums[nums.length-1]):parseInt(nums[1]);
          if(year>2000&&year<2100&&day>=1&&day<=31){
            // Constructor LOCAL — sin UTC offset bug
            return new Date(year, i, day);
          }
        }
      }
    }
    // ── dd/mm/yyyy ó dd-mm-yyyy ó dd.mm.yyyy ─────────────────────────────
    const ddmm=s.match(/^(\d{1,2})[\/.\-](\d{1,2})[\/.\-](\d{4})$/);
    if(ddmm){
      // Constructor LOCAL
      return new Date(parseInt(ddmm[3]), parseInt(ddmm[2])-1, parseInt(ddmm[1]));
    }
    // ── ISO "2026-05-19" (viene como string de SheetJS) ──────────────────
    // new Date("2026-05-19") = UTC midnight → bug en UTC-3
    const iso=s.match(/^(\d{4})-(\d{2})-(\d{2})/);
    if(iso){
      // Extraer componentes y crear LOCAL
      return new Date(parseInt(iso[1]), parseInt(iso[2])-1, parseInt(iso[3]));
    }
    // ── Último recurso (formatos raros) ───────────────────────────────────
    const tmp=new Date(s);
    if(isNaN(tmp.getTime())) return null;
    // Si llegó aquí y es una fecha UTC, normalizar a local usando UTC components
    return new Date(tmp.getUTCFullYear(), tmp.getUTCMonth(), tmp.getUTCDate());
  }catch(e){return null;}
}

function calcMod(sede){
  const s=String(sede||"").toUpperCase();
  if(s.includes("ONLINE")||s.includes("ZOOM")||s.includes("VIRTUAL")) return "Online";
  if(s.includes("HYBRID")||s.includes("HIBRID")) return "Híbrido";
  return "Presencial";
}

// ── Alineado con utils.py _score_row() ────────────────────────────────
const COLS_FECHA   =["FECHA","DIA","DATE","DÍAS","DIAS","DIAS/FECHAS"];
const COLS_PROGRAMA=["PROGRAMA","DIPLOMA","MAGISTER","CURSO","COURSE","ASIGNATURA","MÓDULO","MODULO","NOMBRE PROGRAMA"];
const COLS_COORD   =["COORDINADORA","RESPONSABLE","COORD","COORDINADOR"];
const COLS_SEDE    =["SEDE","CAMPUS","LUGAR"];
const COLS_SALA    =["SALA","ROOM","AULA"];
const COLS_PROF    =["PROFESOR","DOCENTE","TEACHER","SASLAS"];
const COLS_HORARIO =["HORARIO","HORA","SCHEDULE","HORA INICIO","HORA_INICIO"];
// Mapeo extra (mismo EXTRA_MAP de utils.py)
const EXTRA_MAP={"NOMBRE PROGRAMA":"programa","COORDINADOR":"coord","HORA INICIO":"horario","HORA TERMINO":"horafin","HORA DE TÉRMINO":"horafin"};

function scoreHeaders(keys){
  let s=0;
  for(const v of keys){
    const u=String(v).toUpperCase().trim();
    if(COLS_FECHA.some(k=>u.includes(k)))    s+=3;
    if(COLS_PROGRAMA.some(k=>u.includes(k))) s+=2;
    if(COLS_COORD.some(k=>u.includes(k)))    s+=2;
    if(COLS_SEDE.some(k=>u.includes(k)))     s+=1;
    if(COLS_PROF.some(k=>u.includes(k)))     s+=1;
    if(COLS_HORARIO.some(k=>u.includes(k)))  s+=1;
  }
  return s;
}

// Dado un array de objetos (rows de SheetJS), detecta la fila header si los
// keys del objeto 0 no son buenos headers (igual que utils._find_header_row)
function detectHeaderRow(rawRows){
  if(!rawRows||!rawRows.length) return {rows:rawRows,kFecha:null};
  // SheetJS ya nos da la fila 0 como keys; pero puede que el header real esté en una fila interior
  // Los keys del objeto serán "__EMPTY", "__EMPTY_1"... cuando los encabezados están vacios en fila 0
  const keys0=Object.keys(rawRows[0]);
  let bestScore=scoreHeaders(keys0);
  let bestRow=-1;
  for(let i=0;i<Math.min(30,rawRows.length);i++){
    const vals=Object.values(rawRows[i]).map(v=>String(v||""));
    const sc=scoreHeaders(vals);
    if(sc>bestScore){bestScore=sc;bestRow=i;}
  }
  if(bestRow>=0){
    // La fila bestRow contiene los headers reales
    const newKeys=Object.values(rawRows[bestRow]).map(v=>String(v||"Unknown").trim());
    const data=rawRows.slice(bestRow+1).map(r=>{
      const obj={};Object.values(r).forEach((v,i)=>{obj[newKeys[i]||`_${i}`]=v;});return obj;
    });
    return {rows:data,score:bestScore,detectedAt:bestRow};
  }
  return {rows:rawRows,score:bestScore,detectedAt:-1};
}

// Mapea columna raw (UPPER) al campo estándar, igual que utils._normalizar_df
function mapCols(keys){
  const mapped={fecha:null,programa:null,coord:null,sede:null,sala:null,horario:null,asig:null,prof:null};
  // Extra map primero (more precise)
  for(const k of keys){
    const u=k.toUpperCase().trim();
    if(u==="NOMBRE PROGRAMA"&&!mapped.programa) mapped.programa=k;
    if((u==="COORDINADORA"||u==="RESPONSABLE"||u==="COORDINADOR")&&!mapped.coord) mapped.coord=k;
    if(u==="HORA INICIO"&&!mapped.horario) mapped.horario=k;
    if(u==="ASIGNATURA"&&!mapped.asig) mapped.asig=k;
    if(u==="MODULO"||u==="MÓDULO"&&!mapped.asig) mapped.asig=k;
  }
  // Main mapping (same priority order as utils)
  for(const k of keys){
    const u=k.toUpperCase().trim();
    if(!mapped.fecha    && COLS_FECHA.some(x=>u.includes(x))&&!u.includes("COORDINADORA")) mapped.fecha=k;
    if(!mapped.programa && COLS_PROGRAMA.some(x=>u.includes(x))) mapped.programa=k;
    if(!mapped.coord    && COLS_COORD.some(x=>u.includes(x)))    mapped.coord=k;
    if(!mapped.sede     && (u.includes("SEDE")||u.includes("CAMPUS")))  mapped.sede=k;
    if(!mapped.sala     && COLS_SALA.some(x=>u.includes(x)))     mapped.sala=k;
    if(!mapped.prof     && COLS_PROF.some(x=>u.includes(x)))     mapped.prof=k;
    if(!mapped.horario  && COLS_HORARIO.some(x=>u.includes(x)))  mapped.horario=k;
    if(!mapped.asig     && (u.includes("ASIGNATURA")||u.includes("MODULO")||u.includes("MÓDULO"))) mapped.asig=k;
  }
  return mapped;
}

// ── parseFile: alineado con utils.load_data ────────────────────────────
// data = array of plain objects (ya convertido por SheetJS en el Sidebar)
function parseFile(data,filename){
  if(!data||!data.length) return {error:"El archivo está vacío."};
  try{
    const {rows:cleanRows, detectedAt}=detectHeaderRow(data);
    if(!cleanRows||!cleanRows.length) return {error:"No se encontraron filas de datos."};
    const origKeys=Object.keys(cleanRows[0]);
    const m=mapCols(origKeys);
    if(!m.fecha) return {
      error:`No se encontró columna de fecha. Columnas detectadas: ${origKeys.join(", ")}`,
      cols:origKeys
    };

    // Parsear filas (usando cleanRows con header ya detectado)
    const rows=[];
    for(const r of cleanRows){
      try{
        const fecha=parseFecha(r[m.fecha]);
        if(!fecha) continue;
        const limpia=(k,fb)=>{
          if(!k) return fb;
          const v=r[k];
          const s=String(v==null?"":v).trim();
          return (s===""||s==="nan"||s==="None"||s==="NaN")?fb:s;
        };
        rows.push({
          fecha,
          programa:limpia(m.programa,"Sin programa"),
          coord:   limpia(m.coord,"Sin coord"),
          sede:    limpia(m.sede,""),
          sala:    limpia(m.sala,""),
          horario: limpia(m.horario,""),
          asig:    limpia(m.asig,""),
          profesor:limpia(m.prof,""),
        });
      }catch(e){}
    }

    if(rows.length===0) return {
      error:`Se encontró la columna "${kFecha}" pero ninguna fila tiene fecha válida.`,
      cols:origKeys, kFecha
    };

    // Agregar modalidad calculada
    for(const r of rows) r.modalidad=calcMod(r.sede);

    const hoy=new Date();
    hoy.setHours(0,0,0,0);

    // Stats básicas
    const programas=[...new Set(rows.map(r=>r.programa).filter(p=>p&&p!=="nan"))];
    const coords=[...new Set(rows.map(r=>r.coord).filter(c=>c&&c!=="nan"))];

    const rowsHoy = rows.filter(r => {
      const d = r.fecha;
      return d.getFullYear() === hoy.getFullYear() && d.getMonth() === hoy.getMonth() && d.getDate() === hoy.getDate();
    });
    const sesHoy = rowsHoy.length;
    const fin7 = new Date(hoy); fin7.setDate(fin7.getDate() + 7);
    const sesProx7 = rows.filter(r => r.fecha >= hoy && r.fecha <= fin7).length;

    // Tendencia mensual
    const porMes=MESES.map((mes,i)=>({mes,sesiones:rows.filter(r=>r.fecha.getMonth()===i).length}));

    // Por coordinadora
    const coordMap={};
    for(const r of rows){
      const c=r.coord; if(!c||c==="nan") continue;
      if(!coordMap[c]) coordMap[c]={name:c,sesiones:0,progsSet:new Set(),diasSet:new Set()};
      coordMap[c].sesiones++;
      coordMap[c].progsSet.add(r.programa);
      coordMap[c].diasSet.add(`${r.fecha.getFullYear()}-${r.fecha.getMonth()}-${r.fecha.getDate()}`);
    }
    const porCoord=Object.values(coordMap).map(c=>({
      name:c.name, sesiones:c.sesiones,
      programas:c.progsSet.size, diasActivos:c.diasSet.size
    })).sort((a,b)=>b.sesiones-a.sesiones);

    // Por programa
    const progMap={};
    for(const r of rows){
      const p=r.programa; if(!p||p==="nan") continue;
      if(!progMap[p]) progMap[p]={nombre:p,coord:r.coord,sesiones:0,fechas:[]};
      progMap[p].sesiones++;
      progMap[p].fechas.push(r.fecha);
    }
    const porProg=Object.values(progMap).map(p=>{
      const fs=p.fechas.sort((a,b)=>a-b);
      const ini=fs[0],fin=fs[fs.length-1];
      let avance=0;
      if(ini&&fin&&fin>ini) avance=Math.min(100,Math.max(0,Math.round(((hoy-ini)/(fin-ini))*100)));
      else if(fin&&fin<hoy) avance=100;
      const estado=avance>=100?"✅ Finalizado":avance>0?"🔄 En Curso":"📅 Planificado";
      return {nombre:p.nombre,coord:p.coord,sesiones:p.sesiones,avance,estado,inicio:ini,fin};
    }).sort((a,b)=>b.sesiones-a.sesiones);

    // Alertas exactas del Streamlit (calendario2.py)
    const alertas=[];
    const fin7b=new Date(hoy); fin7b.setDate(fin7b.getDate()+7);
    // 1. Cursos finalizando esta semana
    const terminando=porProg.filter(p=>p.fin&&p.fin>=hoy&&p.fin<=fin7b&&p.estado==="🔄 En Curso");
    if(terminando.length>0) alertas.push({tipo:"⚠️ Cursos finalizando",detalle:`${terminando.length} programa(s) terminan esta semana: ${terminando.slice(0,2).map(p=>p.nombre.slice(0,25)).join(", ")}`,prioridad:"Alta"});
    // 2. Sin profesor
    const sinProf=rows.filter(r=>!r.profesor||r.profesor===""||r.profesor.toUpperCase()==="POR DEFINIR");
    if(sinProf.length>0) alertas.push({tipo:"👨‍🏫 Sin Profesor",detalle:`${sinProf.length} sesiones sin docente asignado`,prioridad:"Media"});
    // 3. Sin sala
    const sinSala=rows.filter(r=>!r.sala||r.sala===""||r.sala.toUpperCase()==="POR ASIGNAR");
    if(sinSala.length>0) alertas.push({tipo:"🏢 Sin Sala",detalle:`${sinSala.length} sesiones sin sala asignada`,prioridad:"Media"});
    // 4. Días críticos (coord con >2 programas en un día — igual a Streamlit)
    const cargaDiariaMap={};
    for(const r of rows){
      const k=`${r.coord}||${r.fecha.getFullYear()}-${r.fecha.getMonth()}-${r.fecha.getDate()}`;
      if(!cargaDiariaMap[k]) cargaDiariaMap[k]={coord:r.coord,fecha:r.fecha,progs:new Set()};
      cargaDiariaMap[k].progs.add(r.programa);
    }
    const diasCriticos=Object.values(cargaDiariaMap).filter(d=>d.progs.size>2);
    if(diasCriticos.length>0) alertas.push({tipo:"🔥 Días Críticos",detalle:`${diasCriticos.length} días con >2 programas simultáneos`,prioridad:"Alta"});
    // 5. Sin sesiones próximas
    if(sesProx7===0&&rows.length>0) alertas.push({tipo:"📅 Sin sesiones próximas",detalle:"No hay clases en los próximos 7 días",prioridad:"Media"});
    if(alertas.length===0) alertas.push({tipo:"✅ Todo al día",detalle:"Sin alertas críticas detectadas",prioridad:"Ok"});
    // Guardar para otros tabs
    const sinProfesor=sinProf.length;
    const sinSalaCount=sinSala.length;

    // Próximas sesiones
    const proximas=rows.filter(r=>r.fecha>=hoy).sort((a,b)=>a.fecha-b.fecha).slice(0,8);

    // Por sede
    const sedeMap={};
    for(const r of rows){const s=r.sede||"Sin sede";if(!sedeMap[s]) sedeMap[s]={sede:s,sesiones:0,progs:new Set()};sedeMap[s].sesiones++;sedeMap[s].progs.add(r.programa);}
    const porSede=Object.values(sedeMap).map(s=>({sede:s.sede,sesiones:s.sesiones,programas:s.progs.size})).sort((a,b)=>b.sesiones-a.sesiones);
    // Por modalidad
    const modMap={};
    for(const r of rows){const m=r.modalidad||"Presencial";if(!modMap[m]) modMap[m]={modalidad:m,sesiones:0,progs:new Set()};modMap[m].sesiones++;modMap[m].progs.add(r.programa);}
    const porMod=Object.values(modMap).map(m=>({modalidad:m.modalidad,sesiones:m.sesiones,programas:m.progs.size})).sort((a,b)=>b.sesiones-a.sesiones);
    // Por día semana
    const diasN=["Lunes","Martes","Miércoles","Jueves","Viernes","Sábado","Domingo"];
    const porDia=diasN.map((d,i)=>({dia:d,sesiones:rows.filter(r=>(r.fecha.getDay()===0?6:r.fecha.getDay()-1)===i).length}));
    // Heatmap coord x dia
    const heatCoordDia={};
    for(const r of rows){const c=r.coord;const di=(r.fecha.getDay()===0?6:r.fecha.getDay()-1);const k=`${c}||${di}`;if(!heatCoordDia[k]) heatCoordDia[k]=0;heatCoordDia[k]++;}
    // Carga/puntaje por coord × programa (sesiones/4 × factor_alumnos=1)
    // Igual que Streamlit get_factor_alumnos con alumnos=0 → factor=1
    const cargaPuntaje={}; // {coord: {puntaje, progs:[{nombre,sesiones,puntaje}]}}
    for(const p of porProg){
      const c=p.coord;
      if(!cargaPuntaje[c]) cargaPuntaje[c]={puntaje:0,progs:[]};
      const ps=(p.sesiones/4)*1.0; // factor_alumnos=1 por defecto
      cargaPuntaje[c].puntaje+=ps;
      cargaPuntaje[c].progs.push({nombre:p.nombre,sesiones:p.sesiones,puntaje:ps});
    }
    // Por programa y asignatura summary
    const progAsigMap = {};
    for (const r of rows) {
      const p = r.programa;
      const a = r.asig || "General";
      if (!p || p === "nan") continue;
      const key = `${p}||${a}`;
      if (!progAsigMap[key]) progAsigMap[key] = { programa: p, asig: a, fechas: [], coord: r.coord };
      progAsigMap[key].fechas.push(r.fecha);
    }
    const porProgAsig = Object.values(progAsigMap).map(i => {
      const fs = i.fechas.sort((a,b) => a-b);
      return { programa: i.programa, asig: i.asig, inicio: fs[0], fin: fs[fs.length-1], coord: i.coord };
    }).sort((a,b) => a.programa.localeCompare(b.programa) || a.inicio - b.inicio);

    // Carga mensual (Puntaje) 
    const mensualMap = {}; // { key: score }
    for(const r of rows){
      const y=r.fecha.getFullYear(), m=r.fecha.getMonth(), c=r.coord;
      const k=`${y}||${m}||${c}`;
      mensualMap[k] = (mensualMap[k]||0) + 0.25; // 1 sesión = 0.25 pts (ses/4)
    }
    const rankMensual = Object.entries(mensualMap).map(([k,v]) => {
      const parts=k.split("||");
      return { year:Number(parts[0]), month:Number(parts[1]), coord:parts[2], puntaje:v };
    });

    const rankCarga=Object.entries(cargaPuntaje).map(([c,v])=>({coord:c,...v})).sort((a,b)=>b.puntaje-a.puntaje);
    return {
      rows, programas, coords, sesHoy, rowsHoy, sesProx7,
      porMes, porCoord, porProg, porProgAsig, alertas, proximas,
      porSede, porMod, porDia, heatCoordDia,
      diasCriticos, sinProfesor, sinSalaCount, rankCarga, rankMensual,
      cols:origKeys,
      kFecha:m.fecha, kProg:m.programa, kCoord:m.coord, kSede:m.sede, kHorario:m.horario,
      detectedAt
    };
  }catch(e){
    return {error:"Error procesando: "+e.message};
  }
}

const abrevProg = (s) => {
  const m = { "MAGISTER": "Mag.", "DIPLOMADO": "Dipl.", "GESTION": "Gest.", "NEGOCIOS": "Neg.", "DIRECCION": "Dir.", "MARKETING": "Mkt.", "FINANZAS": "Fin." };
  let r = String(s || "").toUpperCase();
  for (const [k, v] of Object.entries(m)) r = r.replace(k, v);
  return r.length > 35 ? r.slice(0, 33) + "…" : r;
};

function DownloadButton({label, description, onClick, variant="blue", icon="📥"}){
    const [status, setStatus] = React.useState("idle");
    const colors = {
        blue: {bg: "rgba(14,165,233,0.08)", border: "rgba(14,165,233,0.2)", hover: "rgba(14,165,233,0.15)", text: "#0ea5e9"},
        teal: {bg: "rgba(45,212,191,0.08)", border: "rgba(45,212,191,0.2)", hover: "rgba(45,212,191,0.15)", text: "#2dd4bf"},
        orange: {bg: "rgba(245,158,11,0.08)", border: "rgba(245,158,11,0.2)", hover: "rgba(245,158,11,0.15)", text: "#f59e0b"},
        red: {bg: "rgba(239,68,68,0.08)", border: "rgba(239,68,68,0.2)", hover: "rgba(239,68,68,0.15)", text: "#ef4444"}
    };
    const c = colors[variant] || colors.blue;
    
    // IMPORTANTE: Llamada síncrona para preservar el 'User Gesture' en Safari/Mac
    const handleAction = () => {
        try {
            setStatus("downloading");
            onClick(); // Ejecución inmediata
            setStatus("success");
            setTimeout(() => setStatus("idle"), 2000);
        } catch (e) {
            console.error(e);
            setStatus("error");
            setTimeout(() => setStatus("idle"), 3000);
        }
    };

    return (
        <div 
            onClick={status === "idle" ? handleAction : null}
            style={{
                background: c.bg, border: `1px solid ${c.border}`, borderRadius: 12, padding: "12px 16px",
                cursor: status === "idle" ? "pointer" : "wait", transition: "all 0.2s", display: "flex", flexDirection: "column", gap: 4,
                opacity: status === "downloading" ? 0.7 : 1
            }}
            onMouseOver={e => status === "idle" && (e.currentTarget.style.background = c.hover)}
            onMouseOut={e => status === "idle" && (e.currentTarget.style.background = c.bg)}
        >
            <div style={{display: "flex", alignItems:"center", justifyContent: "space-between"}}>
                <span style={{fontSize: 12, fontWeight: 800, color: c.text, letterSpacing:0.5}}>
                    {status === "downloading" ? "⏳ Generando..." : status === "success" ? "✅ ¡Listo!" : label}
                </span>
                <span style={{fontSize: 14}}>{status === "success" ? "👍" : icon}</span>
            </div>
            <div style={{fontSize: 10, color: "#64748b", lineHeight:1.2}}>
                {status === "downloading" ? "Procesando datos..." : status === "error" ? "❌ Error de bloqueo" : description}
            </div>
        </div>
    );
}

function TrendLine({data}){
  if(!data) return null;
  const max=Math.max(...data.map(d=>d.sesiones),1);
  const w=100,h=60;
  const pts=data.map((d,i)=>({x:(i/(data.length-1))*w,y:h-(d.sesiones/max)*(h-8)-4,...d}));
  const pathD=pts.map((p,i)=>`${i===0?"M":"L"}${p.x.toFixed(1)},${p.y.toFixed(1)}`).join(" ");
  const areaD=`M0,${h} ${pts.map(p=>`L${p.x.toFixed(1)},${p.y.toFixed(1)}`).join(" ")} L${w},${h} Z`;
  return(
    <div>
      <svg viewBox={`0 0 100 ${h}`} style={{width:"100%",height:60}} preserveAspectRatio="none">
        <defs><linearGradient id="tg" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor="#2dd4bf" stopOpacity="0.4"/>
          <stop offset="100%" stopColor="#2dd4bf" stopOpacity="0"/>
        </linearGradient></defs>
        <path d={areaD} fill="url(#tg)"/>
        <path d={pathD} fill="none" stroke="#2dd4bf" strokeWidth="1.5"/>
        {pts.filter(p=>p.sesiones>0).map((p,i)=><circle key={i} cx={p.x.toFixed(1)} cy={p.y.toFixed(1)} r="2" fill="#2dd4bf"/>)}
      </svg>
      <div style={{display:"flex",justifyContent:"space-between",marginTop:2}}>
        {data.filter((_,i)=>i%3===0).map(d=><span key={d.mes} style={{fontSize:10,color:"#64748b"}}>{d.mes.slice(0,3)}</span>)}
      </div>
    </div>
  );
}

  const total=n=>filtered.reduce((a,c)=>a+(c[n]||0),0);
  // Intensidad diaria: días con >N programas
  const hoy=new Date(); hoy.setHours(0,0,0,0);
  const rows=sel==="Todas"?st.rows:st.rows.filter(r=>r.coord===sel);
  const cargaDia={};
  for(const r of rows){
    const k=r.fecha.toLocaleDateString("es-CL",{day:"2-digit",month:"2-digit"});
    if(!cargaDia[k]) cargaDia[k]={fecha:k,n:new Set(),rawDate:r.fecha};

// ── Export Excel Function (Solución Profesional FileSaver + Binary) ───────
function exportToExcel(rows, filename="export.xlsx"){
  if(!rows || !rows.length) return alert("No hay datos para exportar");
  if (typeof XLSX === 'undefined') return alert("Error crítico: La librería Excel no se cargó. Verifique su conexión a internet.");

  try {
    const cleanRows = rows.map(r => {
      const newRow = {};
      Object.keys(r).forEach(k => {
        let val = r[k];
        if (val instanceof Date) {
          val = `${val.getFullYear()}-${String(val.getMonth()+1).padStart(2,'0')}-${String(val.getDate()).padStart(2,'0')}`;
        }
        newRow[k] = val;
      });
      return newRow;
    });

    const ws = XLSX.utils.json_to_sheet(cleanRows);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "Datos");
    
    // Método oficial writeFile: Automáticamente maneja el Blob y la descarga nativa
    // Es el más compatible con Mac, Safari y dispositivos móviles.
    XLSX.writeFile(wb, filename);
    
    console.log("Exportación gatillada vía XLSX.writeFile.");
  } catch (e) {
    console.error("Error crítico export:", e);
    alert("No se pudo generar el Excel: " + e.message);
  }
}

function copyToClipboard(rows) {
  if(!rows || !rows.length) return alert("No hay datos para copiar");
  try {
    const headers = Object.keys(rows[0]);
    const tsv = [headers.join("\t"), ...rows.map(row => headers.map(h => String(row[h]||"")).join("\t"))].join("\n");
    
    // Intento 1: API moderna (solo funciona en sitios seguros o localhost)
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(tsv).then(() => {
        alert("✅ ¡Copiado! Ahora abre Excel y presiona Pegar (Cmd+V).");
      }).catch(err => copyFallback(tsv));
    } else {
      copyFallback(tsv);
    }
  } catch(e) {
    alert("Error al copiar datos: " + e.message);
  }
}

function copyFallback(text) {
  const textArea = document.createElement("textarea");
  textArea.value = text;
  textArea.style.position = "fixed"; 
  textArea.style.left = "-999999px";
  textArea.style.top = "-999999px";
  document.body.appendChild(textArea);
  textArea.focus();
  textArea.select();
  try {
    const success = document.execCommand('copy');
    if(success) alert("✅ ¡Copiado con éxito! Ahora ve a Excel y presiona Pegar (Cmd+V).");
    else throw new Error("Comando bloqueado");
  } catch (err) {
    showManualExtractions(null, text);
  }
  document.body.removeChild(textArea);
}

// ── Tab Calendario ────────────────────────────────────────────────────────
function TabCalendario({st}){
  if(!st) return <NoData/>;
  const now=new Date();
  const [year,setYear]=useState(now.getFullYear());
  const [month,setMonth]=useState(now.getMonth()+1);
  const [tipoFiltro, setTipoFiltro]=useState("coord"); // "coord" o "sede"
  const [filtro,setFiltro]=useState("Todas");

  // Opciones filtro
  const opciones = tipoFiltro==="coord" ? ["Todas",...st.coords] : ["Todas",...st.porSede.map(s=>s.sede)];

  // Filtro
  let rows = tipoFiltro==="coord"
      ? (filtro==="Todas"?st.rows:st.rows.filter(r=>r.coord===filtro))
      : (filtro==="Todas"?st.rows:st.rows.filter(r=>r.sede===filtro));

  // Mes actual del calendario
  const mesRows=useMemo(()=>rows.filter(r=>r.fecha.getFullYear()===year&&r.fecha.getMonth()===month-1),[rows,year,month]);

  // Eventos por día
  const eventsMap=useMemo(()=>{
    const m={};
    for(const r of mesRows){
      const d=r.fecha.getDate();
      if(!m[d]) m[d]=[];
      m[d].push(r);
    }
    return m;
  },[mesRows]);

  // Calendario grid (lunes primero)
  const getDaysGrid=()=>{
    const firstDay=new Date(year,month-1,1).getDay();
    const offset=(firstDay===0?6:firstDay-1);
    const lastDay=new Date(year,month,0).getDate();
    const grid=[];
    let day=1-offset;
    for(let w=0;w<6;w++){
      const week=[];
      for(let d=0;d<7;d++){week.push(day>0&&day<=lastDay?day:0);day++;}
      grid.push(week);
      if(day>lastDay) break;
    }
    return grid;
  };

  const grid=getDaysGrid();
  const prevMonth=()=>{if(month===1){setMonth(12);setYear(y=>y-1);}else setMonth(m=>m-1);};
  const nextMonth=()=>{if(month===12){setMonth(1);setYear(y=>y+1);}else setMonth(m=>m+1);};

  return(
    <div style={{display:"flex",flexDirection:"column",gap:12}}>
      {/* Controles, Filtros y Botón de exportar */}
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:10,background:"#1e293b",padding:"10px 14px",borderRadius:12,border:"1px solid #334155"}}>
        
        {/* Controles de Mes */}
        <div style={{display:"flex",alignItems:"center",gap:6}}>
          <button className="btn btn-ghost" onClick={prevMonth} style={{padding:"6px 12px",fontSize:13}}>‹ Mes Ant.</button>
          <div style={{fontSize:16,fontWeight:800,color:"#f1f5f9",minWidth:140,textAlign:"center"}}>
            {MESES[month-1]} {year}
          </div>
          <button className="btn btn-ghost" onClick={nextMonth} style={{padding:"6px 12px",fontSize:13}}>Mes Sig. ›</button>
          <button className="btn btn-ghost" onClick={()=>{setYear(now.getFullYear());setMonth(now.getMonth()+1);}}>Ir a Hoy</button>
        </div>

        {/* Filtros dinámicos y Botones */}
        <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
          <select value={tipoFiltro} onChange={e=>{setTipoFiltro(e.target.value);setFiltro("Todas");}} style={{background:"#0f172a",borderColor:"#334155"}}>
            <option value="coord">Coordinadora</option>
            <option value="sede">Sede</option>
          </select>
          <select value={filtro} onChange={e=>setFiltro(e.target.value)} style={{maxWidth:200,background:"#0f172a",borderColor:"#334155"}}>
            {opciones.map(o=><option key={o} value={o}>{String(o).split(" ")[0]}</option>)}
          </select>
          <span style={{fontSize:12,color:"#10b981",fontWeight:700,marginLeft:8}}>{mesRows.length} sesiones</span>
          
          <button className="btn btn-primary" onClick={()=>exportToExcel(mesRows,`Calendario_${MESES[month-1]}_${year}.xlsx`)}
            title="Descargar este mes como archivo Excel (.xlsx)"
            style={{padding:"6px 14px",display:"flex",alignItems:"center",gap:4,boxShadow:"0 4px 12px rgba(14,165,233,0.3)"}}>
            <span style={{fontSize:16}}>📊</span> Exportar Mes a Excel
          </button>
        </div>
      </div>

      {/* Calendario Grilla */}
      <div className="apple-cal">
        <div className="apple-grid-header">
          {DIAS_CORTOS.map(d=><div key={d} className="apple-weekday">{d}</div>)}
        </div>
        <div className="apple-grid-body">
          {grid.map((week,wi)=>week.map((day,di)=>{
            if(!day) return <div key={`${wi}-${di}`} className="apple-cell" style={{background:"#0a0f1e"}}/>;
            const isToday=day===now.getDate()&&month===now.getMonth()+1&&year===now.getFullYear();
            const evts=(eventsMap[day]||[]).sort((a,b)=>a.horario.localeCompare(b.horario));
            return(
              <div key={`${wi}-${di}`} className="apple-cell" style={{background:isToday?"#1a2842":""}}>
                <div className="apple-day-num">
                  <span className={isToday?"apple-day-today":""} style={{color:isToday?"#fff":""}}>{day}</span>
                </div>
                {evts.slice(0,4).map((e,ei)=>(
                  <div key={ei} className="evt-card">
                    <div className="evt-time">{e.horario||""}</div>
                    <div className="evt-prog" title={e.programa}>{abrevProg(e.programa)}</div>
                    {e.asig&&<div className="evt-sub">{e.asig}</div>}
                    <div className="evt-meta">
                      {e.sala&&`📍${e.sala} `}{e.sede&&`🏢${e.sede.slice(0,8)}`}
                    </div>
                  </div>
                ))}
                {evts.length>4&&<div style={{fontSize:9,color:"#64748b",textAlign:"center"}}>+{evts.length-4} más</div>}
              </div>
            );
          }))}
        </div>
      </div>

      {/* Tabla detalle del mes debajo del calendario */}
      {mesRows.length>0&&(
        <div className="card">
          <div style={{fontSize:13,fontWeight:700,color:"#f1f5f9",marginBottom:10,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <span>📋 Agenda Detallada | {MESES[month-1]} {year}</span>
          </div>
          <div style={{overflowX:"auto"}}>
            <table className="table-base">
              <thead><tr>
                {["Fecha","Horario","Programa","Asignatura","Profesor","Coord.","Sede","Sala"].map(h=><th key={h}>{h}</th>)}
              </tr></thead>
              <tbody>
                {[...mesRows].sort((a,b)=>a.fecha-b.fecha).map((r,i)=>(
                  <tr key={i}>
                    <td style={{color:"#0ea5e9",fontWeight:600,whiteSpace:"nowrap"}}>{r.fecha.toLocaleDateString("es-CL",{weekday:"short",day:"2-digit",month:"short"})}</td>
                    <td style={{color:"#94a3b8",whiteSpace:"nowrap"}}>{r.horario||"—"}</td>
                    <td style={{color:"#f1f5f9",maxWidth:180,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}} title={r.programa}>{r.programa}</td>
                    <td style={{color:"#94a3b8",maxWidth:140,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{r.asig||"—"}</td>
                    <td style={{color:"#94a3b8",whiteSpace:"nowrap"}}>{r.profesor||"—"}</td>
                    <td style={{color:"#64748b",whiteSpace:"nowrap"}}>{r.coord.includes(" ") ? r.coord.split(" ").slice(0,2).join(" ") : r.coord}</td>
                    <td style={{color:"#64748b"}}>{r.sede||"—"}</td>
                    <td style={{color:"#64748b"}}>{r.sala||"—"}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </div>
      )}
    </div>
  );
}

                    <span style={{fontSize:10,color:"white",fontWeight:700}}>{pct>10?`${pct}%`:""}</span>

                 const k = d.month; acc[k]=(acc[k]||0)+d.puntaje; return acc;

              {st.coords.filter(c => selCoord==="Todas" || c===selCoord).map(c => {

    </div>
  );
}
// ── Tab Calidad/Sede ───────────────────────────────────────────────────────
function TabCalidad({st}){
  if(!st) return <NoData/>;
  // Pie SVG simple
  const PieSVG=({data,labelKey,valueKey})=>{
    const total=data.reduce((s,d)=>s+(d[valueKey]||0),0)||1;
    const colors=["#0ea5e9","#2dd4bf","#f59e0b","#8b5cf6","#ef4444","#10b981"];
    let cum=0;
    const slices=data.map((d,i)=>{
      const pct=(d[valueKey]||0)/total;
      const startAngle=cum*2*Math.PI;
      cum+=pct;
      const endAngle=cum*2*Math.PI;
      const x1=50+45*Math.sin(startAngle),y1=50-45*Math.cos(startAngle);
      const x2=50+45*Math.sin(endAngle),y2=50-45*Math.cos(endAngle);
      const large=pct>0.5?1:0;
      return {path:`M50,50 L${x1.toFixed(2)},${y1.toFixed(2)} A45,45 0 ${large},1 ${x2.toFixed(2)},${y2.toFixed(2)} Z`,color:colors[i%colors.length],label:d[labelKey],value:d[valueKey],pct:Math.round(pct*100)};
    });
    return(
      <div style={{display:"flex",alignItems:"center",gap:16}}>
        <svg viewBox="0 0 100 100" style={{width:130,height:130,flexShrink:0}}>
          {slices.map((s,i)=><path key={i} d={s.path} fill={s.color} stroke="#0f172a" strokeWidth="1"/>)}
          <circle cx="50" cy="50" r="28" fill="#1e293b"/>
          <text x="50" y="55" textAnchor="middle" fill="#f1f5f9" fontSize="14" fontWeight="bold">{total}</text>
        </svg>
        <div style={{display:"flex",flexDirection:"column",gap:5}}>
          {slices.map((s,i)=>(
            <div key={i} style={{display:"flex",alignItems:"center",gap:6}}>
              <div style={{width:10,height:10,borderRadius:2,background:s.color,flexShrink:0}}/>
              <span style={{fontSize:11,color:"#f1f5f9"}}>{s.label}</span>
              <span style={{fontSize:11,color:"#64748b"}}>{s.value} ({s.pct}%)</span>
            </div>
          ))}
        </div>
      </div>
    );
  };
  return(
    <div style={{display:"flex",flexDirection:"column",gap:12}}>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
        <div className="card">
          <div style={{fontSize:13,fontWeight:700,color:"#f1f5f9",marginBottom:12}}>🌐 Distribución por Modalidad</div>
          <PieSVG data={st.porMod} labelKey="modalidad" valueKey="sesiones"/>
          <table className="table-base" style={{marginTop:12}}>
            <thead><tr><th>Modalidad</th><th>Sesiones</th><th>Programas</th></tr></thead>
            <tbody>{st.porMod.map((r,i)=>(
              <tr key={i}><td style={{color:"#f1f5f9"}}>{r.modalidad}</td><td style={{color:"#0ea5e9",textAlign:"center"}}>{r.sesiones}</td><td style={{color:"#64748b",textAlign:"center"}}>{r.programas}</td></tr>
            ))}</tbody>
          </table>
        </div>
        <div className="card">
          <div style={{fontSize:13,fontWeight:700,color:"#f1f5f9",marginBottom:12}}>🏢 Sesiones por Sede</div>
          <BarH data={st.porSede.slice(0,10)} lk="sede" vk="sesiones" color="#2dd4bf"/>
        </div>
      </div>
      <div className="card">
        <div style={{fontSize:13,fontWeight:700,color:"#f1f5f9",marginBottom:12}}>🧹 Calidad de Datos</div>
        <table className="table-base">
          <thead><tr><th>Campo</th><th>Total</th><th>Con dato</th><th>Faltantes</th><th>Calidad</th></tr></thead>
          <tbody>{[
            ["Programa","programa"],["Coordinadora","coord"],["Sede","sede"],["Horario","horario"],["Asignatura","asig"],["Profesor","profesor"],["Sala","sala"]
          ].map(([label,key])=>{
            const total=st.rows.length;
            const conDato=st.rows.filter(r=>r[key]&&r[key]!=""&&r[key]!="nan"&&r[key]!="Sin programa"&&r[key]!="Sin coord").length;
            const falt=total-conDato;
            const pct=Math.round((conDato/total)*100)||0;
            return(
              <tr key={key}>
                <td style={{color:"#f1f5f9"}}>{label}</td>
                <td style={{color:"#64748b",textAlign:"center"}}>{total}</td>
                <td style={{color:"#10b981",textAlign:"center"}}>{conDato}</td>
                <td style={{color:falt>0?"#ef4444":"#10b981",textAlign:"center"}}>{falt}</td>
                <td style={{minWidth:100}}>
                  <div style={{display:"flex",alignItems:"center",gap:6}}>
                    <div style={{flex:1,background:"#334155",borderRadius:4,height:6}}><div style={{height:"100%",borderRadius:4,width:`${pct}%`,background:pct>80?"#10b981":pct>50?"#f59e0b":"#ef4444"}}/></div>
                    <span style={{fontSize:10,color:"#64748b"}}>{pct}%</span>
                  </div>
                </td>
              </tr>
            );
          })}
          </tbody>
        </table>
      </div>
    </div>
  );
}

function TabComparativa({st}){
  if(!st) return <NoData/>;
  const hoy=new Date(); hoy.setHours(0,0,0,0);
  const years=[...new Set(st.rows.map(r=>r.fecha.getFullYear()))].sort();
  const [y1,setY1]=useState(years[years.length-1]||new Date().getFullYear());
  const [y2,setY2]=useState(years[years.length-2]||years[0]||new Date().getFullYear()-1);
  const rowsY1=st.rows.filter(r=>r.fecha.getFullYear()===y1);
  const rowsY2=st.rows.filter(r=>r.fecha.getFullYear()===y2);
  const delta=(a,b)=>b>0?((a-b)/b*100).toFixed(1):"N/A";
  // Ranking coordinadoras con carga
  const rankCoords=st.porCoord.map(c=>{
    const realizadas=st.rows.filter(r=>r.coord===c.name&&r.fecha<hoy).length;
    const pct=c.sesiones>0?Math.round((realizadas/c.sesiones)*100):0;
    return{...c,realizadas,pct};
  });
  return(
    <div style={{display:"flex",flexDirection:"column",gap:12}}>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
        <div className="card">
          <div style={{fontSize:13,fontWeight:700,color:"#f1f5f9",marginBottom:10}}>📊 Comparativa Año vs Año</div>
          <div style={{display:"flex",gap:8,marginBottom:12}}>
            <select value={y1} onChange={e=>setY1(Number(e.target.value))} style={{flex:1}}>{years.map(y=><option key={y} value={y}>{y}</option>)}</select>
            <select value={y2} onChange={e=>setY2(Number(e.target.value))} style={{flex:1}}>{years.map(y=><option key={y} value={y}>{y}</option>)}</select>
          </div>
          {[{label:"Sesiones",a:rowsY1.length,b:rowsY2.length},
            {label:"Programas",a:new Set(rowsY1.map(r=>r.programa)).size,b:new Set(rowsY2.map(r=>r.programa)).size},
            {label:"Profesores",a:new Set(rowsY1.map(r=>r.profesor).filter(Boolean)).size,b:new Set(rowsY2.map(r=>r.profesor).filter(Boolean)).size},
            {label:"Días activos",a:new Set(rowsY1.map(r=>r.fecha.toDateString())).size,b:new Set(rowsY2.map(r=>r.fecha.toDateString())).size}
          ].map(({label,a,b})=>(
            <div key={label} style={{display:"flex",justifyContent:"space-between",padding:"8px 0",borderBottom:"1px solid #334155"}}>
              <span style={{color:"#94a3b8",fontSize:12}}>{label}</span>
              <span style={{color:"#0ea5e9",fontSize:12,fontWeight:700}}>{a}</span>
              <span style={{color:"#64748b",fontSize:12}}>{b} (anterior)</span>
              <span style={{color:a>b?"#10b981":"#ef4444",fontSize:11,fontWeight:700}}>{a>b?"+":""}{delta(a,b)}%</span>
            </div>
          ))}
        </div>
        <div className="card">
          <div style={{fontSize:13,fontWeight:700,color:"#f1f5f9",marginBottom:12}}>🏆 Ranking de Carga</div>
          <BarH data={rankCoords} lk="name" vk="sesiones" color="#0ea5e9"/>
        </div>
      </div>
      <div className="card">
        <div style={{fontSize:13,fontWeight:700,color:"#f1f5f9",marginBottom:12}}>⚖️ Cumplimiento por Coordinadora</div>
        <table className="table-base">
          <thead><tr><th>Coordinadora</th><th>Sesiones</th><th>Programas</th><th>Días Activos</th><th>Realizadas</th><th>Cumplimiento</th></tr></thead>
          <tbody>{rankCoords.map((c,i)=>(
            <tr key={i}>
              <td style={{color:"#f1f5f9",maxWidth:160,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{c.name}</td>
              <td style={{color:"#0ea5e9",textAlign:"center",fontWeight:700}}>{c.sesiones}</td>
              <td style={{color:"#2dd4bf",textAlign:"center"}}>{c.programas}</td>
              <td style={{color:"#64748b",textAlign:"center"}}>{c.diasActivos}</td>
              <td style={{color:"#94a3b8",textAlign:"center"}}>{c.realizadas}</td>
              <td style={{minWidth:100}}>
                <div style={{display:"flex",alignItems:"center",gap:6}}>
                  <div style={{flex:1,background:"#334155",borderRadius:4,height:8}}><div style={{height:"100%",borderRadius:4,width:`${c.pct}%`,background:c.pct>80?"#10b981":c.pct>50?"#f59e0b":"#ef4444"}}/></div>
                  <span style={{fontSize:11,color:"#64748b",minWidth:35}}>{c.pct}%</span>
                </div>
              </td>
            </tr>
          ))}
          </tbody>
        </table>
      </div>
    </div>
  );
}
