              style={{
                width:"100%", 
                padding:"12px 16px", 
                textAlign:"center", 
                fontSize:16, 
                letterSpacing:4, 
                borderColor: errorLogin ? "#ef4444" : "#334155",
                background: "#0f172a"
              }}
            />
            {errorLogin && <div style={{color:"#ef4444", fontSize:10, fontWeight:700, marginTop:6}}>❌ Contraseña incorrecta</div>}
          </div>
          <button type="submit" className="btn btn-primary" style={{width:"100%", height:45, fontSize:13, fontWeight:700}}>
            Desbloquear Panel
          </button>
        </form>
        
        <div style={{marginTop:30, paddingTop:20, borderTop:"1px solid #334155", fontSize:11, color:"#64748b"}}>
          UAI Postgrado Ejecutivos · Sistema de Planificación
        </div>
      </div>
    </div>
  );

  const resetSim = () => {
    if(!st) return;
    const initial = {};
    st.porProg.forEach(p => { initial[p.nombre] = p.coord; });
    setSim(initial);
  };

  // Función de normalización robusta (Desarrollador Grade)
  const norm = (s) => (s || "").toString().trim().toUpperCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");

  const autoBalance = () => {
    if(!st) return;
    
    // 1. Normalización y Filtros base
    const omitNorm = excluidasSim.map(c => norm(c));
    const fijasNorm = fijasSim.map(c => norm(c));
    const espNorm = ["Sin coord", "POR ASIGNAR", "Por definir", "N/A", "Sin programa", "None", "nan", ""].map(e => norm(e));

    // Equipo Activo Real (Gente que NO está omitida y NO es placeholder)
    const equipoActivo = st.coords.filter(c => {
      const cn = norm(c);
      return !omitNorm.includes(cn) && !espNorm.includes(cn);
    });

    // Receptores (Activos que NO están congelados/fijas)
    const receptores = equipoActivo.filter(c => !fijasNorm.includes(norm(c)));

    if (receptores.length === 0) return;

    const newSim = {...sim};
    const currentLoads = {};
    const progsRepartir = [];

    // Mapeo para normalización de nombres (Preservar nombres originales para el renderizado)
    const coordMap = {};
    st.coords.forEach(c => { 
      currentLoads[c] = 0; 
      coordMap[norm(c)] = c; 
    });

    // 2. Clasificación de Carga (Prioridad: Estado Simulado -> Original)
    st.porProg.forEach(p => {
      const resActual = (sim[p.nombre] || p.coord || "Sin coord");
      const resNorm = norm(resActual);
      
      const isPlaceholder = espNorm.includes(resNorm);
      
      if (!isPlaceholder) {
        // PERMANENCIA: Se queda con su responsable actual (Activa, Fija u Omitida)
        newSim[p.nombre] = resActual;
        const mappedName = coordMap[resNorm] || resActual;
        if (currentLoads.hasOwnProperty(mappedName)) {
          currentLoads[mappedName] += p.sesiones;
        }
      } else {
        // ORFANDAD: El programa es huérfano, hay que repartirlo
        progsRepartir.push(p);
      }
    });

    // 3. Distribución Balanceada
    progsRepartir.sort((a,b) => b.sesiones - a.sesiones).forEach(p => {
      const bestCoord = receptores.reduce((a, b) => currentLoads[a] < currentLoads[b] ? a : b);
      newSim[p.nombre] = bestCoord;
      currentLoads[bestCoord] += p.sesiones;
    });

    setSim(newSim);
  };

  // HEADER DE GESTIÓN (Siempre visible si está autenticado)
  const header = (
    <div style={{display:"flex",gap:8,alignItems:"center",justifyContent:"space-between",marginBottom:16,background:"rgba(14,165,233,0.05)",padding:"10px 14px",borderRadius:12,border:"1px solid rgba(14,165,233,0.1)"}}>
      <div style={{display:"flex",gap:8}}>
        <button className={`btn ${activeSubTab==="analisis"?"btn-primary":"btn-ghost"}`} 
          onClick={()=>setActiveSubTab("analisis")} style={{fontSize:11,padding:"6px 16px"}}>📊 Análisis Actual</button>
        <button className={`btn ${activeSubTab==="simulador"?"btn-primary":"btn-ghost"}`} 
          onClick={()=>{setActiveSubTab("simulador"); autoBalance();}} style={{fontSize:11,padding:"6px 16px"}}>🧩 Simulador Reasignación</button>
        <button className={`btn ${activeSubTab==="mensual"?"btn-primary":"btn-ghost"}`} 
          onClick={()=>setActiveSubTab("mensual")} style={{fontSize:11,padding:"6px 16px"}}>📅 Análisis Mensual</button>
      </div>
      <div style={{display:"flex",alignItems:"center",gap:12}}>
        <span style={{fontSize:10,color:"#0ea5e9",fontWeight:700,letterSpacing:1}}>SESIÓN ACTIVA</span>
        <button className="btn btn-ghost" onClick={()=>setAuth(false)} style={{fontSize:11,padding:"6px 14px",borderColor:"#ef444433",color:"#ef4444"}}>🔒 Salir</button>
      </div>
    </div>
  );

  if(!st) return (
    <div style={{display:"flex",flexDirection:"column",gap:12}}>
      {header}
      <div className="card" style={{textAlign:"center",padding:40}}>
        <div style={{fontSize:40,marginBottom:12}}>📂</div>
        <div style={{fontSize:14,color:"#f1f5f9",fontWeight:700}}>Cargue un archivo para ver métricas</div>
        <div style={{fontSize:11,color:"#64748b",marginTop:4}}>El panel de gestión requiere datos procesados.</div>
      </div>
    </div>
  );

  const calcCargaSim = () => {
    const counts = {};
    const omitNormList = excluidasSim.map(c => norm(c));
    
    st.coords.forEach(c => { counts[c] = 0; });
    st.porProg.forEach(p => {
      const coord = sim[p.nombre] || p.coord;
      if(!counts[coord]) counts[coord] = 0;
      counts[coord] += p.sesiones;
    });

    return st.coords.map(c => {
      const rcFound = st.rankCarga.find(rc => rc.coord === c);
      const originalP = rcFound ? rcFound.puntaje : 0;
      return {
        name: c,
        puntaje: (counts[c] || 0) / 4,
        original: originalP
      };
    }).filter(c => !omitNormList.includes(norm(c.name)))
      .sort((a,b) => b.puntaje - a.puntaje);
  };

  const cargaSim = calcCargaSim();
  const maxPSim = Math.max(...cargaSim.map(c => Math.max(c.puntaje, c.original)), 0) || 1;
  const progsSim = st.porProg.filter(p => {
    const isOmitida = excluidasSim.some(e => e.trim().toUpperCase() === (sim[p.nombre] || p.coord).trim().toUpperCase());
    return !isOmitida && p.nombre.toLowerCase().includes(busqSim.toLowerCase());
  });
  const maxPActual = Math.max(...st.rankCarga.map(r=>r.puntaje),1);

  const valRows=[
    {campo:"Sin profesor",  count:st.sinProfesor,  color:"#f59e0b"},
    {campo:"Sin sala",      count:st.sinSalaCount, color:"#f59e0b"},
    {campo:"Días críticos", count:st.diasCriticos.length, color:"#ef4444"},
    {campo:"Sin programa",  count:st.rows.filter(r=>r.programa==="Sin programa").length, color:"#ef4444"},
    {campo:"Sin coordinadora",count:st.rows.filter(r=>r.coord==="Sin coord").length, color:"#ef4444"},
  ];

  const rowsMes = st.rows.filter(r => r.fecha.getMonth() === Number(mesFiltro));
  const omitNormList = excluidasSim.map(c => norm(c));
  const loadMesCoord = st.coords.filter(c => !omitNormList.includes(norm(c))).map(c => {
    const ses = rowsMes.filter(r => r.coord === c).length;
    return { name: c, sesiones: ses };
  }).sort((a,b) => b.sesiones - a.sesiones);

  return(
    <div style={{display:"flex",flexDirection:"column",gap:12}}>
      {header}

      {activeSubTab === "mensual" && (
        <div style={{display:"flex", flexDirection:"column", gap:12}}>
          <div className="card" style={{display:"flex", justifyContent:"space-between", alignItems:"center"}}>
            <div style={{fontSize:13, fontWeight:700, color:"#f1f5f9"}}>📊 Carga Mensual por Coordinadora</div>
            <select value={mesFiltro} onChange={e=>setMesFiltro(Number(e.target.value))} 
              style={{padding:"4px 12px", borderRadius:8, background:"#1e293b", color:"#fff", border:"1px solid #334155", fontSize:12, cursor:"pointer"}}>
              {MESES.map((m,i) => <option key={i} value={i}>{m}</option>)}
            </select>
          </div>
          
          <div className="card">
            <div style={{fontSize:11, color:"#94a3b8", marginBottom:16}}>Visualización de registros filtrados para <strong>{MESES[Number(mesFiltro)] || "Seleccione..."}</strong></div>
            <div style={{display:"flex", flexDirection:"column", gap:10}}>
              {loadMesCoord.map((lc, i) => {
                const maxSes = Math.max(...loadMesCoord.map(x=>x.sesiones), 1);
                const pct = (lc.sesiones / maxSes) * 100;
                return (
                  <div key={i} style={{display:"flex", alignItems:"center", gap:12}}>
                    <div style={{width:130, fontSize:11, color:"#f1f5f9", overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap"}} title={lc.name}>{lc.name}</div>
                    <div style={{flex:1, height:22, background:"#0f172a", borderRadius:11, overflow:"hidden", position:"relative"}}>
                      <div style={{height:"100%", width:`${pct}%`, background:lc.sesiones > 20 ? "linear-gradient(90deg, #ef4444, #f87171)" : "linear-gradient(90deg, #0ea5e9, #2dd4bf)", borderRadius:11, transition:"width 0.6s cubic-bezier(0.4, 0, 0.2, 1)"}}/>
                      <div style={{position:"absolute", inset:0, display:"flex", alignItems:"center", justifyContent:"flex-end", paddingRight:12, fontSize:10, fontWeight:800, color:"#fff", textShadow:"0 1px 2px rgba(0,0,0,0.5)"}}>
                        {lc.sesiones} ses
                      </div>
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        </div>
      )}

      {activeSubTab === "analisis" && (
        <div style={{display:"flex",flexDirection:"column",gap:12}}>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
            <div className="card">
              <div style={{fontSize:13,fontWeight:700,color:"#f1f5f9",marginBottom:12}}>⚖️ Carga por Coordinadora</div>
              {st.rankCarga.filter(c => !omitNormList.includes(norm(c.coord))).map((c,i)=>{
                const pct=Math.round((c.puntaje/maxPActual)*100);
                const col=pct>80?"#ef4444":pct>60?"#f59e0b":"#10b981";
                return(
                  <div key={i} style={{marginBottom:8}}>
                    <div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}>
                      <span style={{fontSize:11,color:"#f1f5f9"}}>{c.coord}</span>
                      <span style={{fontSize:11,color:col,fontWeight:700}}>{c.puntaje.toFixed(1)} pts</span>
                    </div>
                    <div style={{background:"#334155",borderRadius:4,height:8}}><div style={{height:"100%",borderRadius:4,width:`${pct}%`,background:col}}/></div>
                  </div>
                );
              })}
            </div>
            <div className="card">
              <div style={{fontSize:13,fontWeight:700,color:"#f1f5f9",marginBottom:12}}>🧹 Calidad de Datos</div>
              <table className="table-base">
                <thead><tr><th>Problema</th><th>Cant.</th><th>Estado</th></tr></thead>
                <tbody>{valRows.map((r,i)=>(
                  <tr key={i}>
                    <td>{r.campo}</td>
                    <td style={{color:r.count>0?r.color:"#10b981",fontWeight:700,textAlign:"center"}}>{r.count}</td>
                    <td style={{textAlign:"center"}}>{r.count>0?"⚠":"✅"}</td>
                  </tr>
                ))}</tbody>
              </table>
            </div>
          </div>
          <div className="card">
            <div style={{fontSize:13,fontWeight:700,color:"#f1f5f9",marginBottom:12}}>📊 Detalles de Asignación Actual</div>
            <div style={{maxHeight:400,overflowY:"auto"}}>
              <table className="table-base">
                <thead style={{position:"sticky",top:0,zIndex:5,background:"#1e2d3d"}}>
                  <tr><th>Coordinadora</th><th>Programa</th><th>Pts</th></tr>
                </thead>
                <tbody>{st.rankCarga.filter(c => !omitNormList.includes(norm(c.coord))).map(c => 
                  c.progs.map((p,idx) => (
                    <tr key={`${c.coord}-${idx}`}>
                      {idx===0?<td rowSpan={c.progs.length} style={{color:"#0ea5e9",fontWeight:700,verticalAlign:"top",paddingTop:8}}>{c.coord}</td>:null}
                      <td>{p.nombre}</td>
                      <td style={{textAlign:"center",fontWeight:700}}>{p.puntaje.toFixed(1)}</td>
                    </tr>
                  ))
                ).reduce((acc, val) => acc.concat(val), [])}</tbody>
              </table>
            </div>
          </div>
        </div>
      )}

      {activeSubTab === "simulador" && (
        <div style={{display:"grid",gridTemplateColumns:"1.2fr 1.8fr",gap:12}}>
          <div className="card">
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
              <div style={{fontSize:13,fontWeight:700,color:"#f1f5f9"}}>📊 Simulador de Impacto</div>
              <div style={{display:"flex",gap:6}}>
                <button className="btn btn-ghost" onClick={autoBalance} style={{fontSize:10,padding:"2px 10px",borderColor:"#10b98133",color:"#10b981"}}>🪄 Auto-Equilibrar</button>
                <button className="btn btn-ghost" onClick={resetSim} style={{fontSize:10,padding:"2px 8px"}}>↺ Reset</button>
              </div>
            </div>

            <div style={{background:"rgba(14,165,233,0.03)", padding:12, borderRadius:12, border:"1px solid rgba(14,165,233,0.1)", marginBottom:16}}>
              <div style={{fontSize:11, fontWeight:700, color:"#0ea5e9", marginBottom:10}}>⚙️ Configuración del Simulador</div>
              
              <div style={{display:"flex", flexDirection:"column", gap:10}}>
                <div>
                  <div style={{fontSize:10, color:"#94a3b8", marginBottom:4}}>🚪 OMITIR (Fuera del Simulador - No participan / Conservan su carga)</div>
                  <div style={{display:"flex", flexWrap:"wrap", gap:6}}>
                    {st.coords.map(c => (
                      <label key={c} style={{display:"flex", alignItems:"center", gap:4, fontSize:10, background:excluidasSim.includes(c)?"#ef444422":"#0f172a", padding:"2px 8px", borderRadius:4, cursor:"pointer", border:excluidasSim.includes(c)?"1px solid #ef444444":"1px solid #334155"}}>
                        <input type="checkbox" checked={excluidasSim.includes(c)} onChange={()=>{
                          if(excluidasSim.includes(c)) setExcluidasSim(excluidasSim.filter(x=>x!==c));
                          else { setExcluidasSim([...excluidasSim, c]); setFijasSim(fijasSim.filter(x=>x!==c)); }
                        }} />
                        {c}
                      </label>
                    ))}
                  </div>
                </div>

                <div>
                  <div style={{fontSize:10, color:"#94a3b8", marginBottom:4}}>📌 FIJAS (Congeladas - No cambian su carga)</div>
                  <div style={{display:"flex", flexWrap:"wrap", gap:6}}>
                    {st.coords.map(c => {
                      const isFuera = excluidasSim.some(e => e.trim().toUpperCase() === c.trim().toUpperCase());
                      const isFija = fijasSim.some(f => f.trim().toUpperCase() === c.trim().toUpperCase());
                      return (
                        <label key={c} style={{display:"flex", alignItems:"center", gap:4, fontSize:10, background:isFija?"#f59e0b22":"#0f172a", padding:"2px 8px", borderRadius:4, cursor:"pointer", border:isFija?"1px solid #f59e0b44":"1px solid #334155", opacity:isFuera?0.5:1}}>
                          <input type="checkbox" disabled={isFuera} checked={isFija} onChange={()=>{
                            if(isFija) setFijasSim(fijasSim.filter(x=>x.trim().toUpperCase() !== c.trim().toUpperCase()));
                            else setFijasSim([...fijasSim, c]);
                          }} />
                          {c}
                        </label>
                      );
                    })}
                  </div>
                </div>
              </div>
            </div>

            {/* Gráfico Radar de Equilibrio */}
            {cargaSim.length >= 3 && (
              <div style={{padding:"10px 0",background:"rgba(14,165,233,0.03)",borderRadius:12,marginBottom:16,border:"1px solid rgba(14,165,233,0.08)"}}>
                <div style={{textAlign:"center",fontSize:10,color:"#94a3b8",marginBottom:4,fontWeight:700}}>EQUILIBRIO DE CARGA (PROMEDIO: {(cargaSim.reduce((a,b)=>a+b.puntaje,0)/cargaSim.length).toFixed(1)} pts)</div>
                <div style={{display:"flex",justifyContent:"center",position:"relative"}}>
                  <svg viewBox="0 0 100 100" style={{width:220,height:180}}>
                    {/* Grid de círculos */}
                    {[0.2, 0.4, 0.6, 0.8, 1].map(lvl => (
                      <circle key={lvl} cx="50" cy="50" r={lvl*40} fill="none" stroke="#334155" strokeWidth="0.5" strokeDasharray="2,2" />
                    ))}
                    {/* Ejes */}
                    {cargaSim.map((_, i) => {
                      const ang = (i / cargaSim.length) * 2 * Math.PI;
                      return <line key={i} x1="50" y1="50" x2={50 + 40 * Math.sin(ang)} y2={50 - 40 * Math.cos(ang)} stroke="#334155" strokeWidth="0.5" />;
                    })}
                    {/* Polígono Original */}
                    <polygon points={cargaSim.map((c, i) => {
                      const ang = (i / cargaSim.length) * 2 * Math.PI;
                      const r = Math.min(1, (c.original / maxPSim)) * 40;
                      return `${(50 + r * Math.sin(ang)).toFixed(1)},${(50 - r * Math.cos(ang)).toFixed(1)}`;
                    }).join(" ")} fill="rgba(148,163,184,0.1)" stroke="#94a3b8" strokeWidth="1" strokeDasharray="3,2" />
                    {/* Polígono Simulado */}
                    <polygon points={cargaSim.map((c, i) => {
                      const ang = (i / cargaSim.length) * 2 * Math.PI;
                      const r = Math.min(1, (c.puntaje / maxPSim)) * 40;
                      return `${(50 + r * Math.sin(ang)).toFixed(1)},${(50 - r * Math.cos(ang)).toFixed(1)}`;
                    }).join(" ")} fill="rgba(14,165,233,0.2)" stroke="#0ea5e9" strokeWidth="1.5" style={{transition:"all 0.4s"}} />
                  </svg>
                  <div style={{position:"absolute",bottom:0,left:0,right:0,display:"flex",justifyContent:"center",gap:12,fontSize:9}}>
                    <span style={{color:"#94a3b8"}}>--- Original</span>
                    <span style={{color:"#0ea5e9"}}>▬ Simulado</span>
                  </div>
                </div>
              </div>
            )}
            {/* Gráfico de Barras Comparativo */}
            <div style={{padding:"14px", background:"rgba(15,23,42,0.3)", borderRadius:12, marginBottom:16, border:"1px solid #334155"}}>
              <div style={{fontSize:11, fontWeight:800, color:"#f1f5f9", marginBottom:15, display:"flex", alignItems:"center", gap:6}}>
                <span>📈 Distribución de Carga: Original vs Simulado</span>
              </div>
              <div style={{height:100, display:"flex", alignItems:"flex-end", gap:8, paddingBottom:5}}>
                {cargaSim.map((c, i) => {
                  const hSim = Math.min(100, (c.puntaje / maxPSim) * 100);
                  const hOri = Math.min(100, (c.original / maxPSim) * 100);
                  return (
                    <div key={i} style={{flex:1, height:"100%", display:"flex", flexDirection:"column", gap:2, justifyContent:"flex-end", position:"relative"}}>
                      <div style={{width:"100%", display:"flex", justifyContent:"center", alignItems:"flex-end", gap:2, height:"100%"}}>
                         {/* Original */}
                         <div style={{width:6, height:`${hOri}%`, background:"rgba(148,163,184,0.15)", borderRadius:"2px 2px 0 0", border:"1px solid rgba(148,163,184,0.3)"}} title="Original"/>
                         {/* Simulado */}
                         <div style={{width:6, height:`${hSim}%`, background:c.puntaje>8?"#ef4444":"#0ea5e9", borderRadius:"2px 2px 0 0", boxShadow:c.puntaje>8?"0 0 10px rgba(239,68,68,0.2)":"0 0 10px rgba(14,165,233,0.2)", transition:"height 0.3s"}} title="Simulado"/>
                      </div>
                      <div style={{fontSize:8, color:"#64748b", textAlign:"center", marginTop:4, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap"}}>
                        {c.name.split(" ")[0]}
                      </div>
                    </div>
                  );
                })}
              </div>
              <div style={{display:"flex", gap:12, marginTop:10, justifyContent:"center"}}>
                <div style={{display:"flex", alignItems:"center", gap:4}}><div style={{width:8, height:8, background:"rgba(148,163,184,0.3)", borderRadius:2}}/><span style={{fontSize:9, color:"#64748b"}}>Actual</span></div>
                <div style={{display:"flex", alignItems:"center", gap:4}}><div style={{width:8, height:8, background:"#0ea5e9", borderRadius:2}}/><span style={{fontSize:9, color:"#64748b"}}>Simulado</span></div>
              </div>
            </div>
            {/* Resumen de Cambios Automáticos */}
            {Object.keys(sim).some(k => sim[k] !== st.porProg.find(p=>p.nombre===k)?.coord) && (
              <div style={{marginBottom:16, background:"rgba(16,185,129,0.05)", padding:10, borderRadius:8, border:"1px solid rgba(16,185,129,0.1)"}}>
                <div style={{fontSize:11, fontWeight:700, color:"#10b981", marginBottom:6}}>✅ Reasignaciones Sugeridas / Realizadas</div>
                <div style={{maxHeight:120, overflowY:"auto", fontSize:10}}>
                  {st.porProg.filter(p => {
                    const isOmitida = excluidasSim.some(e => e.trim().toUpperCase() === p.coord.trim().toUpperCase());
                    return !isOmitida && sim[p.nombre] && sim[p.nombre] !== p.coord;
                  }).map(p => (
                    <div key={p.nombre} style={{display:"flex", justifyContent:"space-between", padding:"2px 0", borderBottom:"1px solid #33415522"}}>
                      <span style={{color:"#f1f5f9", maxWidth:140, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap"}}>{p.nombre}</span>
                      <span style={{color:"#94a3b8"}}>{p.coord.split(" ")[0]} → <strong style={{color:"#10b981"}}>{sim[p.nombre].split(" ")[0]}</strong></span>
                    </div>
                  ))}
                </div>
              </div>
            )}

            {cargaSim.map((c, i) => {
              const pctSim = (c.puntaje / maxPSim) * 100;
              const pctOri = (c.original / maxPSim) * 100;
              const diff = c.puntaje - c.original;
              return(
                <div key={i} style={{marginBottom:12, paddingBottom:4, borderBottom:"1px solid #33415533"}}>
                  <div style={{display:"flex",justifyContent:"space-between",fontSize:11,marginBottom:4}}>
                    <span style={{color:"#f1f5f9"}}>{c.name}</span>
                    <span style={{color:diff>0?"#ef4444":diff<0?"#10b981":"#94a3b8",fontWeight:700}}>
                      {c.puntaje.toFixed(1)} {diff!==0 ? "(" + (diff>0?"+":"") + diff.toFixed(1) + ")" : ""}
                    </span>
                  </div>
                  <div style={{height:10,position:"relative",background:"#334155",borderRadius:5,overflow:"hidden"}}>
                    <div style={{position:"absolute",top:0,left:0,height:"100%",width:`${pctOri}%`,background:"rgba(255,255,255,0.05)",borderRight:"2px solid rgba(255,255,255,0.1)",zIndex:1}}/>
                    <div style={{position:"absolute",top:0,left:0,height:"100%",width:`${pctSim}%`,background:c.puntaje>8?"#ef4444":c.puntaje>6?"#f59e0b":"#0ea5e9",transition:"width 0.3s",zIndex:2}}/>
                  </div>
                </div>
              );
            })}
            <button className="btn btn-primary" style={{width:"100%",marginTop:12,height:38}} onClick={() => exportToExcel(
              st.porProg.map(p => ({
                Programa: p.nombre, Original: p.coord, Simulado: sim[p.nombre] || p.coord,
                Sesiones: p.sesiones, Cambio: (sim[p.nombre] !== p.coord ? "SÍ" : "NO")
              })), "Propuesta_Reasignacion_Carga.xlsx"
            )}>📥 Descargar Propuesta Excel</button>
          </div>
          <div className="card" style={{display:"flex",flexDirection:"column"}}>
            <div style={{fontSize:13,fontWeight:700,color:"#f1f5f9",marginBottom:12}}>📋 Mesa de Control de Asignaciones</div>
            <input value={busqSim} onChange={e=>setBusqSim(e.target.value)} placeholder="🔍 Buscar programa..." style={{width:"100%",marginBottom:10,fontSize:12,padding:8}}/>
            <div style={{maxHeight:450,overflowY:"auto"}}>
              <table className="table-base">
                <thead style={{position:"sticky",top:0,zIndex:5,background:"#1e2d3d"}}>
                  <tr><th>Programa</th><th>Responsable Actual / Nuevo</th></tr>
                </thead>
                <tbody>{progsSim.map((p, i) => (
                  <tr key={i}>
                    <td style={{fontSize:10,maxWidth:220,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}} title={p.nombre}>{p.nombre}</td>
                    <td>
                      <select value={sim[p.nombre] || p.coord} onChange={e => setSim({...sim, [p.nombre]: e.target.value})}
                        style={{fontSize:10,padding:"2px 6px",width:"100%",background:sim[p.nombre] && sim[p.nombre] !== p.coord ? "rgba(245,158,11,0.1)" : "transparent",
                               border:sim[p.nombre] && sim[p.nombre] !== p.coord ? "1px solid #f59e0b" : "1px solid #334155"}}>
                        {st.coords.filter(c => {
                          const cu = c.trim().toUpperCase();
                          return !excluidasSim.map(ex => ex.trim().toUpperCase()).includes(cu) && 
                                 !["Sin coord", "POR ASIGNAR", "Por definir", "N/A", "Sin programa", "None", "nan", ""].map(e => e.toUpperCase()).includes(cu);
                        }).map(c => <option key={c} value={c}>{c}</option>)}
                      </select>
                    </td>
                  </tr>
                ))}</tbody>
              </table>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

function TabColumnas({st,cols}){

  return(
    <div style={{display:"flex", flexDirection:"column", gap:20}}>
      <div className="card">
        <div style={{fontSize:13,fontWeight:700,color:"#f1f5f9",marginBottom:12}}>🔍 Diagnóstico de Columnas</div>
        {st&&!st.error&&(
          <>
            {st.detectedAt>=0&&(
              <div style={{fontSize:11,color:"#f59e0b",background:"rgba(245,158,11,.08)",border:"1px solid rgba(245,158,11,.3)",borderRadius:8,padding:"8px 12px",marginBottom:10}}>
                ⚠️ Header detectado en fila {st.detectedAt+1}
              </div>
            )}
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:16}}>
              {[["📅 DIAS/FECHAS",st.kFecha],["📚 PROGRAMA",st.kProg],["👩‍💼 COORDINADORA",st.kCoord]].map(([l,v])=>(
                <div key={l} style={{background:"#0f172a",borderRadius:8,padding:"8px 12px",display:"flex",justifyContent:"space-between",gap:8}}>
                  <span style={{fontSize:11,color:"#64748b"}}>{l}</span>
                  <span style={{fontSize:11,color:v?"#10b981":"#ef4444",fontWeight:700}}>{v?`✓`:"❌"}</span>
                </div>
              ))}
            </div>
          </>
        )}
      </div>

      <div className="card" style={{border:"1px solid #10b98144", background:"rgba(16,185,129,.03)"}}>
        <div style={{fontSize:14,fontWeight:800,color:"#10b981",marginBottom:12,display:"flex",alignItems:"center",gap:8}}>
          <span>🚀 Guía para Compartir (Solución Definitiva)</span>
        </div>
        <p style={{fontSize:12, color:"#94a3b8", marginBottom:20, lineHeight:1.5}}>
          Para que su jefatura vea el dashboard y el botón de Excel funcione con su nombre correcto, el archivo DEBE estar alojado en internet (Link HTTPS). Siga estos 3 pasos exactos:
        </p>
        
        <div style={{display:"flex", flexDirection:"column", gap:16}}>
          <div style={{background:"#0f172a", padding:12, borderRadius:12, border:"1px solid #334155"}}>
            <div style={{color:"#0ea5e9", fontSize:11, fontWeight:800, marginBottom:4}}>1. PREPARACIÓN</div>
            <div style={{fontSize:11, color:"#cbd5e1"}}>
              En su Mac, cambie el nombre de este archivo de <code>Calendario_1.html</code> a <strong><code>index.html</code></strong>.
            </div>
          </div>

          <div style={{background:"#0f172a", padding:12, borderRadius:12, border:"1px solid #334155"}}>
            <div style={{color:"#0ea5e9", fontSize:11, fontWeight:800, marginBottom:4}}>2. CREAR CARPETA</div>
            <div style={{fontSize:11, color:"#cbd5e1"}}>
              Cree una carpeta nueva llamada <code>dashboard_uai</code> y meta su archivo <code>index.html</code> dentro.
            </div>
          </div>

          <div style={{background:"#0f172a", padding:12, borderRadius:12, border:"1px solid #10b98144"}}>
            <div style={{color:"#10b981", fontSize:11, fontWeight:800, marginBottom:4}}>3. EL LINK MÁGICO</div>
            <div style={{fontSize:11, color:"#cbd5e1", lineHeight:1.4}}>
              Abra <a href="https://app.netlify.com/drop" target="_blank" style={{color:"#10b981", textDecoration:"underline"}}>Netlify Drop</a> y arrastre la <strong>CARPETA COMPLETA</strong> allí. 
              <br/><br/>
              <strong>¿Por qué?</strong> Netlify solo acepta carpetas. Al subirla, le darán un link (ej: <code>uai-postgrado.netlify.app</code>). Ese es el link que debe enviarle a su jefa.
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

// ── Sidebar con Íconos y App Layout ──────────────────────────────────────────
function App(){
  const [rawData,setRawData]=useState(null);
  const [cols,setCols]=useState([]);
  const [fileInfo,setFileInfo]=useState(null);
  const [tab,setTab]=useState("home");
  const [parseErr,setParseErr]=useState(null);
  const [cat,setCat]=useState(0);
  const [auth,setAuth]=useState(false);
  const [sim, setSim] = useState({});
  const [excluidasSim, setExcluidasSim] = useState([]);
  const [fijasSim, setFijasSim] = useState([]);
  const [activeSubTab, setActiveSubTab] = useState("analisis");
  const [loading, setLoading] = useState(false);

  // Pre-cargar excluidas con valores por defecto (Sin coord, etc)
  useEffect(() => {
    if (goodStats && goodStats.coords && excluidasSim.length === 0) {
      const especiales = ["Sin coord", "POR ASIGNAR", "Por definir", "N/A", "Sin programa"];
      const defaults = goodStats.coords.filter(c => especiales.some(e => c.toLowerCase().trim() === e.toLowerCase().trim()));
      if (defaults.length > 0) setExcluidasSim(defaults);
    }
  }, [goodStats]);

  // Categorías con iconos limpios
  const cats=[
    {icon:"📊", label:"Dashboard",tabs:[{id:"home",label:"🏠 Home"},{id:"coord",label:"👩‍💼 Coordinadoras"},{id:"comp",label:"📊 Comparativa"}]},
    {icon:"📋", label:"Programas",tabs:[{id:"progs",label:"📋 Programas"},{id:"kanban",label:"📌 Kanban"},{id:"calidad",label:"🏫 Calidad"}]},
    {icon:"📅", label:"Calendarios",tabs:[{id:"cal",label:"📅 Calendario"},{id:"global",label:"🌐 Global"}]},
    {icon:"📈", label:"Analytics",tabs:[{id:"analytics",label:"📈 Analytics"}]},
    {icon:"⚙️", label:"Gestión",tabs:[{id:"gestion",label:"⚙️ Gestión"}]},
    {icon:"🔍", label:"Info",tabs:[{id:"cols",label:"🔍 Columnas"}]},
  ];

  const handleLoad=useCallback((data,name)=>{
    setRawData(data);
    setCols(data.length>0?Object.keys(data[0]):[]);
    setFileInfo({name,rows:data.length,allRows:data});
    setParseErr(null);
    setTab("home");
  },[]);

  const processFile = (file) => {
    if(!file) return;
    setLoading(true); setParseErr(null);
    const reader = new FileReader();
    reader.onerror = () => { setParseErr("Error al leer archivo"); setLoading(false); };
    reader.onload = e => {
      try {
        let data;
        if(file.name.toLowerCase().endsWith(".csv")){
          const wb = XLSX.read(e.target.result, {type:"string"});
          data = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], {defval:""});
        } else {
          const wb = XLSX.read(new Uint8Array(e.target.result), {type:"array"});
          let combined = [];
          for(const sn of wb.SheetNames){
            try {
              const rows = XLSX.utils.sheet_to_json(wb.Sheets[sn], {defval:""});
              if(rows.length > 0){
                const keys = Object.keys(rows[0]).map(k => k.toUpperCase());
                if(keys.some(k => k.includes("FECHA") || k.includes("DIA"))) combined = combined.concat(rows);
              }
            } catch(e2){}
          }
          data = combined.length > 0 ? combined : XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], {defval:""});
        }
        if(!data || !data.length) throw new Error("Archivo vacío");
        handleLoad(data, file.name);
      } catch(ex){ setParseErr(ex.message); }
      setLoading(false);
    };
    if(file.name.toLowerCase().endsWith(".csv")) reader.readAsText(file, "UTF-8");
    else reader.readAsArrayBuffer(file);
  };

  const stats = useMemo(() => {
    if(!rawData) return null;
    try { return parseFile(rawData); }
    catch(e) { return {error: "Error: " + e.message}; }
  }, [rawData]);

  const goodStats = stats && !stats.error ? stats : null;

  useEffect(() => {
    if(Object.keys(sim).length === 0 && goodStats && goodStats.porProg) {
      const initial = {};
      goodStats.porProg.forEach(p => { initial[p.nombre] = p.coord; });
      setSim(initial);
    }
  }, [goodStats]);

  return(
    <div style={{height:"100vh",display:"flex",background:"#0f172a",overflow:"hidden"}}>
      
      {/* SIDEBAR LATERAL DE ICONOS */}
      <div style={{width:64,background:"#1e293b",borderRight:"1px solid #334155",display:"flex",flexDirection:"column",alignItems:"center",padding:"20px 0",gap:16,flexShrink:0,zIndex:100,boxShadow:"4px 0 10px rgba(0,0,0,0.2)"}}>
        <div style={{width:40,height:40,borderRadius:12,background:"linear-gradient(135deg,#0ea5e9,#2dd4bf)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:22,marginBottom:20,boxShadow:"0 4px 12px rgba(14,165,233,0.3)"}}>🎓</div>
        {cats.map((c,i)=>(
          <button key={i} onClick={()=>{setCat(i); setTab(c.tabs[0].id);}}
            title={c.label}
            style={{
              width:44, height:44, borderRadius:12, fontSize:20, cursor:"pointer", border:"none",
              background:cat===i?"#334155":"transparent",
              color:cat===i?"#0ea5e9":"#64748b",
              transition:"all 0.2s",
              display:"flex", alignItems:"center", justifyContent:"center",
              position:"relative"
            }}>
            {c.icon}
            {cat===i && <div style={{position:"absolute",left:0,width:3,height:24,background:"#0ea5e9",borderRadius:"0 4px 4px 0"}}/>}
          </button>
        ))}

        <div style={{marginTop:"auto", display:"flex", flexDirection:"column", gap:14, alignItems:"center"}}>
          {fileInfo && (
            <div style={{background:"rgba(15,23,42,0.4)", padding:12, borderRadius:16, border:"1px solid #334155", display:"flex", flexDirection:"column", gap:10, boxShadow:"0 4px 20px rgba(0,0,0,0.2)"}}>
              <button onClick={()=>exportToExcel(fileInfo.allRows, `Calendario_UAI_${new Date().toISOString().slice(0,10)}.xlsx`)}
                title="Exportar a Excel"
                style={{width:40, height:40, borderRadius:10, background:"linear-gradient(135deg,#0ea5e9,#2dd4bf)", color:"#fff", border:"none", cursor:"pointer", fontSize:20, display:"flex", alignItems:"center", justifyContent:"center", transition:"transform 0.2s"}}
                onMouseOver={e=>e.currentTarget.style.transform="scale(1.05)"}
                onMouseOut={e=>e.currentTarget.style.transform="scale(1)"}>
                📊
              </button>
              <button onClick={()=>{setCat(5); setTab("cols");}}
                title="Compartir con Jefatura"
                style={{width:40, height:40, borderRadius:10, background:"rgba(16,185,129,0.2)", color:"#10b981", border:"1px solid rgba(16,185,129,0.3)", cursor:"pointer", fontSize:20, display:"flex", alignItems:"center", justifyContent:"center", transition:"transform 0.2s"}}
                onMouseOver={e=>e.currentTarget.style.transform="scale(1.05)"}
                onMouseOut={e=>e.currentTarget.style.transform="scale(1)"}>
                🚀
              </button>
            </div>
          )}
          <div style={{fontSize:10, color:"#64748b", fontWeight:700}}>v3.8</div>
        </div>
      </div>

      {/* CONTENIDO PRINCIPAL */}
      <div style={{flex:1,display:"flex",flexDirection:"column",minWidth:0}}>
        
        {/* HEADER SUPERIOR (Subtabs) */}
        <div style={{background:"#1e293b",borderBottom:"1px solid #334155",padding:"0 20px",height:50,display:"flex",alignItems:"center",justifyContent:"space-between",flexShrink:0}}>
          <div style={{display:"flex",gap:4,alignItems:"center"}}>
            <span style={{fontSize:12,fontWeight:800,color:"#94a3b8",marginRight:16,textTransform:"uppercase",letterSpacing:1}}>{cats[cat].label}</span>
            {cats[cat].tabs.map(t=>(
              <button key={t.id} onClick={()=>setTab(t.id)}
                style={{
                  padding:"6px 16px",borderRadius:8,fontSize:11,cursor:"pointer",border:"none",
                  background:tab===t.id?"rgba(14,165,233,.1)":"transparent",
                  color:tab===t.id?"#0ea5e9":"#94a3b8",
                  fontWeight:tab===t.id?700:500,
                  transition:"all .2s"
                }}>
                {t.label}
              </button>
            ))}
          </div>
          
          <div style={{display:"flex",alignItems:"center",gap:16}}>
            {auth && <button onClick={()=>{setAuth(false); setTab("home"); setCat(0);}} className="btn" style={{background:"#ef444422", color:"#ef4444", border:"1px solid #ef444444", padding:"4px 12px", fontSize:10}}>🔒 Cerrar Gestión</button>}
            <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end"}}>
              <span style={{fontSize:10,color:fileInfo?"#10b981":"#64748b",fontWeight:700}}>{fileInfo?"● EN LÍNEA":"○ SIN DATOS"}</span>
              {fileInfo && <span style={{fontSize:9,color:"#64748b"}}>{fileInfo.name}</span>}
            </div>
          </div>
        </div>

        {/* ÁREA DE VISTA */}
        <div style={{flex:1,overflow:"auto",padding:20,position:"relative"}}>
          {loading && <div style={{position:"absolute",inset:0,background:"rgba(15,23,42,0.8)",zIndex:1000,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:16}}>
            <div style={{fontSize:40,animation:"spin 2s linear infinite"}}>⏳</div>
            <div style={{fontSize:14,fontWeight:700,color:"#0ea5e9"}}>Procesando Archivo...</div>
          </div>}

          {(parseErr||(stats&&stats.error))&&(
            <div style={{background:"rgba(239,68,68,.08)",border:"1px solid rgba(239,68,68,.3)",borderRadius:12,padding:16,marginBottom:20}}>
              <div style={{fontSize:13,fontWeight:700,color:"#ef4444",marginBottom:4}}>⚠️ Error en los datos</div>
              <div style={{fontSize:12,color:"#94a3b8"}}>{parseErr||(stats&&stats.error)}</div>
            </div>
          )}

          {tab==="home"     && <TabHome st={goodStats} onUpload={processFile}/>}
          {tab==="cal"      && <TabCalendario st={goodStats}/>}
          {tab==="coord"    && <TabCoord st={goodStats}/>}
          {tab==="progs"    && <TabProgramas st={goodStats}/>}
          {tab==="kanban"   && <TabKanban st={goodStats}/>}
          {tab==="global"   && <TabGlobal st={goodStats}/>}
          {tab==="analytics"&& <TabAnalytics st={goodStats}/>}
          {tab==="calidad"  && <TabCalidad st={goodStats}/>}
          {tab==="comp"     && <TabComparativa st={goodStats}/>}
          {tab==="gestion"  && <TabGestion st={goodStats} auth={auth} setAuth={setAuth} sim={sim} setSim={setSim} excluidasSim={excluidasSim} setExcluidasSim={setExcluidasSim} fijasSim={fijasSim} setFijasSim={setFijasSim} activeSubTab={activeSubTab} setActiveSubTab={setActiveSubTab}/>}
          {tab==="cols"     && <TabColumnas st={stats} cols={cols}/>}
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
